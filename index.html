<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceScribe AI Autonomous - Enterprise Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#090d16">
    <!-- Include libraries for PDF and DOCX export generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Autonomous Hub</h2>
            <div class="metrics">
                <div class="metric-card">
                    <span class="label">Engine State</span>
                    <span id="bufferStatus" class="value optimal">Locked / Standby</span>
                </div>
                <div class="metric-card">
                    <span class="label">AI Model Status</span>
                    <span id="modelStatus" class="value">WASM Loading...</span>
                </div>
            </div>

            <div class="settings-group">
                <label>Security PIN / Master Lock</label>
                <div class="pin-box">
                    <input type="password" id="pinInput" placeholder="Enter 4-digit PIN" maxlength="4">
                    <button id="setPinBtn" class="btn accent">Lock</button>
                </div>
                <label>Language Model</label>
                <select id="langSelect">
                    <option value="en-US">English (US)</option>
                    <option value="ur-PK">Urdu (Pakistan)</option>
                    <option value="en-GB">English (UK)</option>
                </select>
                <label class="checkbox-label">
                    <input type="checkbox" id="noiseFilterToggle" checked> Enable Neural Noise Filter
                </label>
            </div>

            <div class="history-section">
                <h3>Secure Vault Sessions</h3>
                <div id="sessionList" class="session-list"></div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <header>
                <h1>VoiceScribe AI Autonomous v5.0</h1>
                <div class="status-badge">
                    <span id="statusDot" class="dot"></span>
                    <span id="statusText">System Locked (Enter PIN)</span>
                </div>
            </header>

            <div class="workspace">
                <div class="toolbar">
                    <button id="startBtn" class="btn primary" disabled>Start Autonomous Stream</button>
                    <button id="stopBtn" class="btn danger" disabled>Terminate & Encrypt</button>
                    <button id="summaryBtn" class="btn accent" disabled>Run Offline AI LLM</button>
                    <button id="installAppBtn" class="btn accent" style="display: none;">Install App 📱</button>
                    <div class="dropdown">
                        <button id="exportMenuBtn" class="btn dark" disabled>Export Options ▼</button>
                        <div id="exportDropdownContent" class="dropdown-content">
                            <button id="exportTxt">Export as TXT</button>
                            <button id="exportPdf">Export as PDF</button>
                            <button id="exportDocx">Export as DOCX</button>
                        </div>
                    </div>
                </div>

                <div class="visualizer-container">
                    <canvas id="audioVisualizer"></canvas>
                </div>

                <div class="split-viewport">
                    <div class="transcript-viewport">
                        <h3>Diarized & Filtered Stream</h3>
                        <div id="transcriptOutput" contenteditable="true"></div>
                    </div>
                    <div class="analytics-viewport">
                        <h3>Autonomous Offline LLM Summary</h3>
                        <div id="summaryOutput">Vault is locked or AI model is initializing...</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Autonomous SW Active'));
        }
    </script>
</body>
</html>
